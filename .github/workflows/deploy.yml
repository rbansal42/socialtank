name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment webhook
        run: |
          set -euo pipefail
          BODY='{"repository":{"full_name":"${{ github.repository }}"},"ref":"${{ github.ref }}","head_commit":{"message":"${{ github.event.head_commit.message }}","author":{"name":"${{ github.event.head_commit.author.name }}"},"id":"${{ github.sha }}"}}'
          SIGNATURE=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | cut -d' ' -f2)
          curl --fail-with-body --silent --show-error -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -H "X-GitHub-Event: push" \
            -d "$BODY" \
            "$WEBHOOK_URL"
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
